networks:
  default:
    name: magento-lab

services:

  # ─── PHP-FPM ─────────────────────────────────────────────────────────────
  # Serves HTTP requests only. No CLI tools here.
  php:
    build:
      context: ./docker/php
      args:
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-false}
    image: magento-lab/phpfpm:latest
    pull_policy: never
    container_name: magento_phpfpm
    restart: unless-stopped
    command: php-fpm --allow-to-run-as-root
    environment:
      MAGENTO_MODE: ${MAGENTO_MODE:-developer}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-2G}
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/zz-root.conf:/usr/local/etc/php-fpm.d/zz-root.conf:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # elasticsearch is NOT a hard dependency for PHP-FPM to start.
      # It only needs to be ready for catalog search. Removing it here
      # cuts startup time by 30-60 s (ES warm-up) on every robo up.
      elasticsearch:
        condition: service_started
    networks:
      - default

  # ─── Maintenance (CLI) ────────────────────────────────────────────────────
  # All bin/magento, composer, cron commands run here.
  # Shares the Magento volume with php via volumes_from.
  maintenance:
    build:
      context: ./docker/php
      args:
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-false}
    image: magento-lab/phpfpm:latest
    pull_policy: never
    container_name: magento_maintenance
    restart: unless-stopped
    command: tail -f /dev/null
    environment:
      MAGENTO_MODE: ${MAGENTO_MODE:-developer}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT_CLI:-4G}
      COMPOSER_ALLOW_SUPERUSER: 1
      COMPOSER_HOME: /composer
    volumes_from:
      - php
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
      - ./volumes/.composer:/composer
      - ./volumes/.ssh:/root/.ssh:ro
    depends_on:
      - php
    networks:
      - default

  # ─── Nginx ───────────────────────────────────────────────────────────────
  # Listens on 8080 (Varnish backend). Direct access via host port 8080.
  nginx:
    image: nginx:1.25-alpine
    pull_policy: missing
    container_name: magento_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_DIRECT_PORT:-8080}:8080"
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - php
    networks:
      default:
        aliases:
          - nginx

  # ─── Varnish ─────────────────────────────────────────────────────────────
  # HTTP cache layer. Public entry point on port 80.
  # Test with/without cache: port 80 (cached) vs port 8080 (direct).
  varnish:
    image: varnish:7.4-alpine
    pull_policy: missing
    container_name: magento_varnish
    restart: unless-stopped
    ports:
      - "${VARNISH_PORT:-80}:80"
    volumes:
      - ./docker/varnish/default.vcl:/etc/varnish/default.vcl:ro
    environment:
      VARNISH_SIZE: ${VARNISH_SIZE:-256m}
    command: >
      varnishd
        -F
        -f /etc/varnish/default.vcl
        -s malloc,${VARNISH_SIZE:-256m}
        -a :80
        -T 127.0.0.1:6082
    depends_on:
      - nginx
    tmpfs:
      - /var/lib/varnish:exec,mode=0777
    networks:
      - default

  # ─── MySQL / MariaDB ─────────────────────────────────────────────────────
  db:
    image: mariadb:10.6
    pull_policy: missing
    container_name: magento_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-magento}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-magento}
      MYSQL_USER: ${MYSQL_USER:-magento}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-magento}
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=150
      - --innodb-buffer-pool-size=1G
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-magento}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    networks:
      - default

  # ─── OpenSearch ──────────────────────────────────────────────────────────
  elasticsearch:
    image: opensearchproject/opensearch:2.12.0
    pull_policy: missing
    container_name: magento_search
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./elasticsearch/data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    networks:
      - default

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    pull_policy: missing
    container_name: magento_redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory ${REDIS_MAXMEMORY:-512mb}
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --loglevel notice
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - default

  # ─── RabbitMQ ────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    pull_policy: missing
    container_name: magento_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-magento}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-magento}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-magento}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - default

  # ─── Mailhog ─────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    pull_policy: missing
    container_name: magento_mail
    restart: unless-stopped
    ports:
      - "${MAILHOG_HTTP_PORT:-8025}:8025"
      - "1025:1025"
    networks:
      - default

volumes:
  db_data:
  rabbitmq_data:
